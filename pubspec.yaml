name: personal_app
description: Personal app with notes, calendar, and calculator.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.5
  sqflite: ^2.4.0
  path_provider: ^2.1.0
  path: ^1.9.0
  flutter_quill: ^11.0.0
  intl: ^0.20.0
  shared_preferences: ^2.5.0
  flutter_local_notifications: ^18.0.0
  timezone: ^0.10.0
  local_auth: ^2.3.0
  share_plus: ^10.0.0
  file_picker: ^8.0.0
  url_launcher: ^6.3.0
  package_info_plus: ^8.0.0
  permission_handler: ^11.3.0
  workmanager: ^0.5.0
  get_it: ^8.0.0
  sqflite_sqlcipher: ^3.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.0
  sqflite_common_ffi: ^2.3.0

flutter:
  uses-material-design: true
