name: personal_app
description: Personal app with notes, calendar, and calculator.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  provider: ^6.1.5
  sqflite: ^2.4.0
  path_provider: ^2.1.0
  flutter_quill: ^11.0.0
  intl: ^0.20.0
  flutter_local_notifications: ^18.0.0
  timezone: ^0.10.1
  record: ^5.1.2
  audioplayers: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
