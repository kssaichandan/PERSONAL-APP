name: personal_app
description: Personal app with notes, calendar, and calculator.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  provider: ^6.1.5
  sqflite: ^2.4.0
  path_provider: ^2.1.0
  intl: ^0.20.0
  flutter_local_notifications: ^18.0.0
  timezone: ^0.10.1
  permission_handler: ^11.3.0
  share_plus: ^10.0.0
  file_picker: ^8.0.0
  shared_preferences: ^2.5.5
  responsive_framework: ^1.5.1
  get_it: ^8.0.0
  workmanager: ^0.5.2
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.2
  sqflite_sqlcipher: ^3.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4
  sqflite_common_ffi: ^2.3.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.1
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 23
  adaptive_icon_background: "assets/icon/adaptive_background.png"
  adaptive_icon_foreground: "assets/icon/adaptive_foreground.png"
  remove_alpha_ios: true

flutter_native_splash:
  color: "#6750A4"
  image: assets/icon/icon.png
  android: true
  ios: true
  web: false