name: Build APK

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter create . --project-name personal_app
      - name: Enable core library desugaring
        run: |
          f="android/app/build.gradle.kts"; [ -f "$f" ] || f="android/app/build.gradle"
          echo "=== $f ==="; cat "$f"; echo "==="
          if echo "$f" | grep -q '\.kts$'; then
            sed -i '/compileOptions {/a\            coreLibraryDesugaringEnabled = true' "$f"
            sed -i '/^dependencies {/a\    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.4")' "$f"
          else
            sed -i '/compileOptions {/a\        coreLibraryDesugaringEnabled true' "$f"
            sed -i '/^dependencies {/a\    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.1.4"' "$f"
          fi
          echo "=== modified ==="; cat "$f"; echo "==="
      - run: flutter build apk --debug
      - uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
