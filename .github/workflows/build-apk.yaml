name: Build APK

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter create . --project-name personal_app
      - name: Enable core library desugaring
        run: |
          if [ -f android/app/build.gradle.kts ]; then
            sed -i '/targetCompatibility = JavaVersion.VERSION_11/a\            setCoreLibraryDesugaringEnabled(true)' android/app/build.gradle.kts
            sed -i '/^dependencies {/a\    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.4")' android/app/build.gradle.kts
          elif [ -f android/app/build.gradle ]; then
            sed -i '/compileOptions {/a\        coreLibraryDesugaringEnabled true' android/app/build.gradle
            sed -i '/^dependencies {/a\    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.1.4"' android/app/build.gradle
          else
            find android -type f 2>/dev/null || echo "(android/ does not exist)"
            exit 1
          fi
      - run: flutter build apk --debug
      - uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
